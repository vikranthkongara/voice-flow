<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Microphone body -->
  <rect x="220" y="140" width="72" height="140" rx="36" fill="url(#wave)"/>

  <!-- Microphone arc -->
  <path d="M 180 260 Q 180 340 256 340 Q 332 340 332 260"
        fill="none" stroke="url(#wave)" stroke-width="16" stroke-linecap="round"/>

  <!-- Microphone stand -->
  <line x1="256" y1="340" x2="256" y2="380" stroke="url(#wave)" stroke-width="16" stroke-linecap="round"/>
  <line x1="220" y1="380" x2="292" y2="380" stroke="url(#wave)" stroke-width="16" stroke-linecap="round"/>

  <!-- Sound waves (right side) -->
  <path d="M 340 200 Q 370 256 340 312" fill="none" stroke="#a5b4fc" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <path d="M 365 175 Q 410 256 365 337" fill="none" stroke="#a5b4fc" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Sound waves (left side) -->
  <path d="M 172 200 Q 142 256 172 312" fill="none" stroke="#a5b4fc" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <path d="M 147 175 Q 102 256 147 337" fill="none" stroke="#a5b4fc" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Text cursor / typing indicator -->
  <rect x="350" y="350" width="4" height="30" rx="2" fill="#fbbf24" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
