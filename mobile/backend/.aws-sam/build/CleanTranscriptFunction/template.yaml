AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Voice Flow backend - cleans speech transcripts via Bedrock

Globals:
  Function:
    Timeout: 30
    Runtime: python3.9
    MemorySize: 256
    Environment:
      Variables:
        BEDROCK_MODEL: anthropic.claude-sonnet-4-6-v1:0
        BEDROCK_REGION: us-west-2

Resources:
  CleanTranscriptFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda_handler.handler
      CodeUri: .
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        ApiPost:
          Type: Api
          Properties:
            Path: /clean
            Method: post
        ApiOptions:
          Type: Api
          Properties:
            Path: /clean
            Method: options

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint for transcript cleanup
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/clean"
